<!-- Open this file in a browser to generate icon PNGs -->
<!-- Right-click each canvas and "Save image as" with the appropriate filename -->
<!DOCTYPE html>
<html>
<body style="background:#1a1a2e;padding:40px;">
<h2 style="color:white;">Right-click each icon → Save image as → icons/iconXX.png</h2>
<div style="display:flex;gap:20px;margin-top:20px;">
<div>
  <p style="color:white;">icon16.png</p>
  <canvas id="c16" width="16" height="16"></canvas>
</div>
<div>
  <p style="color:white;">icon48.png</p>
  <canvas id="c48" width="48" height="48"></canvas>
</div>
<div>
  <p style="color:white;">icon128.png</p>
  <canvas id="c128" width="128" height="128"></canvas>
</div>
</div>
<script>
function drawIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const r = size * 0.15;

  // Background
  ctx.fillStyle = '#8B5CF6';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Gradient overlay
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, 'rgba(139,92,246,1)');
  grad.addColorStop(1, 'rgba(109,40,217,1)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Person icon
  ctx.fillStyle = 'white';
  const cx = size * 0.4;
  const cy = size * 0.35;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx, size * 0.75, size * 0.22, Math.PI, 0);
  ctx.fill();

  // Minus sign
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.08;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(size * 0.6, size * 0.5);
  ctx.lineTo(size * 0.85, size * 0.5);
  ctx.stroke();
}
drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
